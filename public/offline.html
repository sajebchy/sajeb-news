<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ইন্টারনেট সংযোগ নেই — সজীব নিউজ</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: "SolaimanLipi", "Libre Franklin", system-ui, sans-serif;
    background: #f7f7f8;
    color: #1a1a1a;
  }
  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 40px 28px;
  }
  .icon { font-size: 52px; line-height: 1; margin-bottom: 16px; }
  h1 { font-size: 22px; margin: 0 0 10px; }
  p { font-size: 15px; line-height: 1.6; color: #555; margin: 0 0 24px; }
  button {
    font: inherit;
    font-weight: 600;
    color: #fff;
    background: #bb0112;
    border: 0;
    border-radius: 8px;
    padding: 11px 26px;
    cursor: pointer;
  }
  button:hover { background: #94010e; }
  @media (prefers-color-scheme: dark) {
    body { background: #121212; color: #ececec; }
    .card { background: #1c1c1e; border-color: #303034; }
    p { color: #a5a5ab; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>ইন্টারনেট সংযোগ নেই</h1>
    <p>আপনি বর্তমানে অফলাইনে আছেন। সংযোগ ফিরে এলে আবার চেষ্টা করুন।</p>
    <button onclick="location.reload()">আবার চেষ্টা করুন</button>
  </div>
</body>
</html>
